<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed File System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        input[type="text"] {
            width: 70%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background-color: white;
            border-radius: 4px;
            border-left: 5px solid #4CAF50;
        }
        .result.error {
            border-left-color: #f44336;
        }
        .result.warning {
            border-left-color: #ff9800;
        }
        pre {
            background-color: #f8f8f8;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .badge-match  { background-color: #c8e6c9; color: #2e7d32; }
        .badge-found  { background-color: #fff9c4; color: #f57f17; }
        .badge-notfound { background-color: #ffcdd2; color: #c62828; }
        .badge-error  { background-color: #ffcdd2; color: #c62828; }
    </style>
</head>
<body>

    <h1>Distributed File System</h1>
    <p>Enter a filename to retrieve it from the distributed servers.</p>

    <form method="POST">
        <input type="text" name="pathname" placeholder="e.g. file1.txt" required />
        <button type="submit">Request File</button>
    </form>

    {% if result %}
    <div class="result {% if result.status == 'NOT_FOUND' or result.status == 'ERROR' %}error{% endif %}">

        <span class="status-badge badge-{{ result.status | lower }}">{{ result.status }}</span>
        <p>{{ result.message }}</p>

        {% if result.file1 %}
            <h3>File Content:</h3>
            <pre>{{ result.file1 }}</pre>
        {% endif %}

    </div>
    {% endif %}

</body>
</html>
